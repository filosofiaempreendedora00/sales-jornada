<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jornada de Crescimento E-commerce</title>
<style>

:root {
  --bg: #07070f;
  --surface: #0f0f1c;
  --surface2: #17172a;
  --surface3: #1e1e34;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text: #e6e8f2;
  --text-2: #8e93b0;
  --text-3: #4a4e6a;

  --c1: #9b6dff;
  --c2: #4d8dff;
  --c3: #0dcfe8;
  --c4: #ffa826;
  --c5: #12d490;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────────────── */
.header {
  padding: 80px 24px 56px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-8px); }
}

.header-logo {
  width: 72px;
  display: block;
  margin: 0 auto 20px;
  animation: float 3.5s ease-in-out infinite;
  position: relative;
  z-index: 1;
}

.header::before {
  content: '';
  position: absolute;
  top: -80px; left: 50%; transform: translateX(-50%);
  width: 900px; height: 500px;
  background: radial-gradient(ellipse at 50% 20%, rgba(155,109,255,0.14) 0%, transparent 60%);
  pointer-events: none;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(155,109,255,0.1);
  border: 1px solid rgba(155,109,255,0.25);
  border-radius: 99px;
  padding: 5px 14px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--c1);
  margin-bottom: 24px;
}

.badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c1);
  box-shadow: 0 0 8px var(--c1);
}

.header h1 {
  font-size: clamp(28px, 4.8vw, 54px);
  font-weight: 900;
  line-height: 1.08;
  letter-spacing: -1px;
  margin-bottom: 22px;
  background: linear-gradient(160deg, #ffffff 35%, rgba(255,255,255,0.45));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header .subtitle {
  font-size: 17px;
  color: var(--text-2);
  max-width: 520px;
  margin: 0 auto 40px;
  line-height: 1.7;
}

/* Progress */
.progress-wrap {
  max-width: 460px;
  margin: 0 auto;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 9px;
}

.progress-bar {
  height: 5px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--c1) 0%, var(--c2) 28%, var(--c3) 52%, var(--c4) 76%, var(--c5) 100%);
  border-radius: 99px;
  transition: width 0.65s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── LEGEND ─────────────────────────────────────── */
.legend {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 0 24px 32px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: var(--text-3);
}

.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

/* ── FLOW WRAPPER ────────────────────────────────── */
.flow-wrap {
  overflow-x: auto;
  padding: 8px 24px 48px;
  -webkit-overflow-scrolling: touch;
  cursor: default;
}

.flow-wrap::-webkit-scrollbar { height: 3px; }
.flow-wrap::-webkit-scrollbar-track { background: transparent; }
.flow-wrap::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.flow {
  display: flex;
  align-items: flex-start;
  min-width: 900px;
  max-width: 1440px;
  margin: 0 auto;
}

/* ── STAGE ───────────────────────────────────────── */
.stage {
  flex: 1;
  min-width: 0;
}

.stage-head {
  padding: 18px 10px 14px;
  text-align: center;
}

.stage-num {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 5px;
}

.stage-name {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.3px;
}

.stage-divider {
  height: 2px;
  border-radius: 1px;
  margin: 10px 14px 0;
}

.stage-stat {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 7px;
  font-weight: 500;
}

.stage-subtitle {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 8px;
  line-height: 1.45;
  font-style: italic;
  opacity: 0.8;
  padding: 0 4px;
}

.nodes-wrap {
  padding: 10px 8px 20px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* ── ANCHOR STAGES (Concepção + Fine Tuning) ─────── */
.stage--anchor {
  background: rgba(255,255,255,0.022);
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 16px;
  position: relative;
}

.stage--anchor .stage-head {
  padding-top: 20px;
}

.stage--anchor .nodes-wrap {
  padding-bottom: 16px;
}

.stage--anchor .node {
  background: rgba(255,255,255,0.03);
}

.stage--anchor .node:hover {
  background: color-mix(in srgb, var(--nc, #9b6dff) 9%, rgba(255,255,255,0.03));
}

.stage-anchor-tag {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg);
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 99px;
  padding: 2px 10px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-3);
  white-space: nowrap;
}

/* ── NODE ────────────────────────────────────────── */
.node {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 12px 13px;
  cursor: pointer;
  transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  user-select: none;
  overflow: hidden;
}

.node::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: var(--nc, #9b6dff);
  transition: width 0.2s ease;
  border-radius: 11px 0 0 11px;
}

.node:hover {
  border-color: var(--nc, #9b6dff);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.4), 0 0 0 1px var(--nc, #9b6dff);
}

.node:hover::before { width: 3px; }

.node.is-active {
  border-color: var(--nc, #9b6dff);
  box-shadow: 0 0 0 1px var(--nc, #9b6dff), 0 8px 28px rgba(0,0,0,0.45);
  background: color-mix(in srgb, var(--nc, #9b6dff) 7%, var(--surface));
}

.node.is-active::before { width: 3px; }

.node.is-done {
  border-color: rgba(18, 212, 144, 0.3);
  background: rgba(18, 212, 144, 0.04);
}

.node.is-done:hover {
  border-color: rgba(18, 212, 144, 0.55);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35), 0 0 0 1px rgba(18,212,144,0.4);
}

.node.is-warn {
  border-color: rgba(255, 168, 38, 0.28);
}

/* ── SUBTASKS ────────────────────────────────────── */
.node-subtasks {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-left: 10px;
  position: relative;
}

.node-subtasks::before {
  content: '';
  position: absolute;
  left: 2px;
  top: 10px;
  bottom: 6px;
  width: 1px;
  background: rgba(255,255,255,0.07);
}

.node--subtask {
  padding: 9px 11px;
  background: rgba(0,0,0,0.25) !important;
  border-color: rgba(255,255,255,0.05) !important;
}

.node--subtask .node-label {
  font-size: 10.5px;
  font-weight: 600;
}

.node--subtask .node-obj {
  font-size: 9.5px;
  padding-left: 20px;
}

.node--subtask .node-emoji {
  font-size: 13px;
}

.node-row {
  display: flex;
  align-items: flex-start;
  gap: 9px;
}

.node-emoji {
  font-size: 15px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 1px;
}

.node-label {
  flex: 1;
  font-size: 11.5px;
  font-weight: 650;
  line-height: 1.4;
  color: var(--text);
}

.node-obj {
  font-size: 10px;
  color: var(--text-3);
  line-height: 1.4;
  margin-top: 5px;
  padding-left: 24px;
}

.node-indicator {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
  background: var(--text-3);
  transition: background 0.2s;
}

.node.is-done .node-indicator { background: var(--c5); box-shadow: 0 0 6px rgba(18,212,144,0.6); }
.node.is-warn .node-indicator { background: var(--c4); }

/* ── CONNECTOR ───────────────────────────────────── */
.connector {
  width: 32px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 78px;
}

.connector-inner {
  display: flex;
  align-items: center;
  width: 100%;
}

.conn-line {
  flex: 1;
  height: 1.5px;
}

.conn-arrow {
  width: 0; height: 0;
  border-top: 4px solid transparent;
  border-bottom: 4px solid transparent;
  border-left: 7px solid;
  flex-shrink: 0;
}

/* ── DIAGNOSIS ───────────────────────────────────── */
.diagnosis-section {
  max-width: 960px;
  margin: 0 auto 64px;
  padding: 0 24px;
  display: none;
}

.diag-heading {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.diag-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.diag-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  font-size: 13px;
  color: var(--text-3);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.55;
  transition: all 0.3s;
}

.diag-card.is-alert {
  border-color: rgba(239,68,68,0.22);
  background: rgba(239,68,68,0.04);
  color: #fca5a5;
}

.diag-card.is-ok {
  border-color: rgba(18,212,144,0.2);
  background: rgba(18,212,144,0.04);
  color: rgba(18,212,144,0.8);
}

.diag-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
  background: var(--text-3);
}

.diag-card.is-alert .diag-dot { background: #ef4444; }
.diag-card.is-ok .diag-dot { background: var(--c5); }

/* ── OVERLAY + PANEL ─────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.overlay.is-visible {
  opacity: 1;
  pointer-events: all;
}

.panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: min(500px, 100vw);
  background: var(--surface);
  border-left: 1px solid var(--border2);
  z-index: 91;
  transform: translateX(100%);
  transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel.is-open { transform: translateX(0); }

/* Panel header */
.panel-header {
  padding: 26px 24px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
}

.panel-stage-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.panel-title {
  font-size: 21px;
  font-weight: 800;
  line-height: 1.18;
  padding-right: 48px;
}

.close-btn {
  position: absolute;
  top: 22px; right: 20px;
  width: 36px; height: 36px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  font-size: 17px;
  transition: all 0.18s;
  flex-shrink: 0;
}

.close-btn:hover {
  background: rgba(255,255,255,0.09);
  color: var(--text);
  border-color: var(--border2);
}

/* Panel body */
.panel-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 20px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.info-block {
  background: var(--surface2);
  border-radius: 11px;
  padding: 15px 17px;
  border-left: 3px solid var(--panel-color, var(--c1));
}

.block-label {
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 8px;
}

.block-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

.alert-block {
  border-radius: 11px;
  padding: 14px 16px;
  display: flex;
  gap: 11px;
  align-items: flex-start;
}

.alert-block.type-error {
  background: rgba(239,68,68,0.07);
  border: 1px solid rgba(239,68,68,0.18);
}

.alert-block.type-impact {
  background: rgba(245,158,11,0.07);
  border: 1px solid rgba(245,158,11,0.16);
}

.alert-emoji {
  font-size: 17px;
  flex-shrink: 0;
  margin-top: 1px;
}

.alert-inner-label {
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.type-error .alert-inner-label { color: rgba(252,165,165,0.55); }
.type-impact .alert-inner-label { color: rgba(253,230,138,0.55); }

.alert-text {
  font-size: 13.5px;
  line-height: 1.65;
}

.type-error .alert-text { color: #fca5a5; }
.type-impact .alert-text { color: #fde68a; }

/* ── PANEL LINKS (cases) ─────────────────────────── */
.links-block {
  background: linear-gradient(135deg, rgba(255,168,38,0.08) 0%, rgba(255,168,38,0.04) 100%);
  border-radius: 12px;
  padding: 12px 14px;
  border: 1px solid rgba(255,168,38,0.22);
  position: relative;
  overflow: hidden;
}

.links-block::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, #ffa826, rgba(255,168,38,0.2));
  border-radius: 12px 12px 0 0;
}

.links-block .block-label {
  color: rgba(255,168,38,0.65);
  margin-bottom: 11px;
}

.links-cases-header {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 11px;
}

.links-cases-icon {
  font-size: 13px;
  line-height: 1;
}

.links-group-title {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,168,38,0.7);
  background: rgba(255,168,38,0.07);
  border: 1px solid rgba(255,168,38,0.15);
  border-radius: 5px;
  padding: 2px 7px;
  display: inline-block;
  margin-bottom: 4px;
  margin-top: 10px;
}

.links-group-title:first-of-type { margin-top: 2px; }

.link-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,168,38,0.08);
}

.link-row:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.link-name {
  font-size: 12.5px;
  color: var(--text);
  font-weight: 600;
  flex: 1;
}

.link-anchor {
  color: #ffa826;
  text-decoration: none;
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  opacity: 0.75;
  white-space: nowrap;
  transition: opacity 0.15s;
}

.link-anchor:hover {
  opacity: 1;
  text-decoration: underline;
}

.tools-block {
  background: linear-gradient(135deg, rgba(77,141,255,0.08) 0%, rgba(77,141,255,0.04) 100%);
  border-radius: 12px;
  padding: 15px 17px;
  border: 1px solid rgba(77,141,255,0.22);
  position: relative;
  overflow: hidden;
}

.tools-block::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, #4d8dff, rgba(77,141,255,0.2));
  border-radius: 12px 12px 0 0;
}

.tools-block .block-label {
  color: rgba(77,141,255,0.65);
  margin-bottom: 11px;
}

.tools-block .link-row {
  border-bottom-color: rgba(77,141,255,0.08);
}

.tools-block .link-anchor {
  color: #4d8dff;
}

/* Panel footer */
.panel-footer {
  padding: 14px 24px 24px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.toggle-btn {
  width: 100%;
  padding: 14px;
  border-radius: 11px;
  border: 1.5px solid var(--panel-color, var(--c1));
  background: transparent;
  color: var(--panel-color, var(--c1));
  font-size: 13.5px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.18s, transform 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  letter-spacing: 0.2px;
}

.toggle-btn:hover {
  background: color-mix(in srgb, var(--panel-color, var(--c1)) 11%, transparent);
  transform: translateY(-1px);
}

.toggle-btn.is-done {
  background: color-mix(in srgb, var(--panel-color, var(--c1)) 13%, transparent);
}

.toggle-icon {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid currentColor;
  display: inline-block;
  flex-shrink: 0;
  transition: background 0.18s;
}

.toggle-btn.is-done .toggle-icon {
  background: currentColor;
}

/* ── FOOTER ──────────────────────────────────────── */
.footer {
  text-align: center;
  padding: 32px 24px 48px;
  font-size: 12px;
  color: var(--text-3);
  border-top: 1px solid var(--border);
}

/* ── RESPONSIVE ──────────────────────────────────── */
@media (max-width: 680px) {
  .header { padding: 56px 20px 40px; }

  .panel {
    top: auto;
    left: 0; right: 0; bottom: 0;
    width: 100%;
    height: 94vh;
    border-left: none;
    border-top: 1px solid var(--border2);
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
  }

  .panel.is-open { transform: translateY(0); }

  .panel-header { padding: 22px 20px 16px; }
  .panel-title { font-size: 18px; }
  .panel-body { padding: 16px 20px 20px; }
  .panel-footer { padding: 12px 20px 32px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; }
}

</style>
</head>
<body>

<!-- ══════════════════════════════════════════════ -->
<!--  HEADER                                        -->
<!-- ══════════════════════════════════════════════ -->
<header class="header">
  <img src="logo.png" alt="Turbo" class="header-logo">
  <div class="badge">Metodologia Turbo</div>
  <h1>A Jornada do E-commerce Turbo</h1>
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label"></span>
      <span id="prog-pct"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
  </div>
</header>

<!-- ══════════════════════════════════════════════ -->
<!--  LEGEND                                        -->
<!-- ══════════════════════════════════════════════ -->

<!-- ══════════════════════════════════════════════ -->
<!--  FLOW                                          -->
<!-- ══════════════════════════════════════════════ -->
<div class="flow-wrap">
  <div class="flow" id="flow"></div>
</div>

const state = {
  done: new Set(),
  active: null
};

// ─────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────
function allNodes() {
  return STAGES.flatMap(s =>
    s.nodes.map(n => ({ ...n, stageId: s.id, stageColor: s.color, stageName: s.title, stageNum: s.num }))
  );
}

function getNode(id) { return allNodes().find(n => n.id === id); }
function getStage(id) { return STAGES.find(s => s.id === id); }
function totalCount() { return allNodes().length; }

function isWarn(nodeId) {
  const n = getNode(nodeId);
  return n ? n.deps.some(d => !state.done.has(d)) : false;
}

// ─────────────────────────────────────────────────
//  RENDER FLOW
// ─────────────────────────────────────────────────
function renderFlow() {
  const flow = document.getElementById('flow');
  flow.innerHTML = '';

  STAGES.forEach((stage, si) => {
    const doneCount = stage.nodes.filter(n => state.done.has(n.id)).length;

    // Column
    const col = document.createElement('div');
    col.className = 'stage' + (stage.anchor ? ' stage--anchor' : '');

    col.innerHTML = `
      ${stage.anchor ? `<span class="stage-anchor-tag">${stage.anchorLabel}</span>` : ''}
      <div class="stage-head">
        <p class="stage-num" style="color:${stage.color}">${stage.num}</p>
        <p class="stage-name" style="color:${stage.color}">${stage.title}</p>
        <div class="stage-divider" style="background:linear-gradient(90deg,${stage.color},transparent)"></div>
        <p class="stage-subtitle">${stage.subtitle}</p>
        <p class="stage-stat">${doneCount} / ${stage.nodes.length} ok</p>
      </div>
      <div class="nodes-wrap" id="nw-${stage.id}"></div>
    `;

    const wrap = col.querySelector(`#nw-${stage.id}`);

    function buildNodeEl(node, isSub = false) {
      const el = document.createElement('div');
      el.className = 'node' + (isSub ? ' node--subtask' : '');
      el.id = `n-${node.id}`;
      el.style.setProperty('--nc', stage.color);
      el.dataset.id = node.id;

      const isDone = state.done.has(node.id);
      const warn   = !isDone && isWarn(node.id);

      if (isDone) el.classList.add('is-done');
      else if (warn) el.classList.add('is-warn');
      if (state.active === node.id) el.classList.add('is-active');

      el.innerHTML = `
        <div class="node-row">
          <span class="node-emoji">${node.icon}</span>
          <span class="node-label">${node.name}</span>
          <span class="node-indicator"></span>
        </div>
        ${node.objective ? `<p class="node-obj">${node.objective}</p>` : ''}
      `;

      el.addEventListener('click', (e) => { e.stopPropagation(); openPanel(node.id); });
      return el;
    }

    // Separate top-level nodes from children
    const topNodes   = stage.nodes.filter(n => !n.parentId);
    const childNodes = stage.nodes.filter(n => n.parentId);

    topNodes.forEach(node => {
      const el = buildNodeEl(node);
      const children = childNodes.filter(c => c.parentId === node.id);
      if (children.length) {
        const sub = document.createElement('div');
        sub.className = 'node-subtasks';
        children.forEach(c => sub.appendChild(buildNodeEl(c, true)));
        el.appendChild(sub);
      }
      wrap.appendChild(el);
    });

    flow.appendChild(col);

    // Connector arrow between stages
    if (si < STAGES.length - 1) {
      const nc = STAGES[si + 1].color;
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.innerHTML = `
        <div class="connector-inner">
          <div class="conn-line" style="background:linear-gradient(90deg,${stage.color},${nc})"></div>
          <div class="conn-arrow" style="border-left-color:${nc}"></div>
        </div>
      `;
      flow.appendChild(conn);
    }
  });
}

// ─────────────────────────────────────────────────
//  PROGRESS
// ─────────────────────────────────────────────────
function renderProgress() {
  const n = state.done.size;
  const t = totalCount();
  const pct = Math.round((n / t) * 100);

  document.getElementById('prog-fill').style.width = pct + '%';

  if (n === 0) {
    document.getElementById('prog-label').textContent = '';
    document.getElementById('prog-pct').textContent = '';
  } else if (n === t) {
    document.getElementById('prog-label').textContent = 'Jornada completa! 🎉 Parabéns pela estrutura sólida.';
    document.getElementById('prog-pct').textContent = '100%';
  } else {
    document.getElementById('prog-label').textContent = `${n} de ${t} etapas estruturadas`;
    document.getElementById('prog-pct').textContent = pct + '%';
  }
}

  const alerts = [];

  if (d('trafego') && !d('validacao'))
    alerts.push('Você está rodando tráfego pago sem produto validado. Alto risco de escalar um problema.');
  if (d('trafego') && !d('oferta'))
    alerts.push('Tráfego pago ativo sem oferta estruturada. Basicamente jogar dinheiro fora.');
  if (d('trafego') && !d('landing'))
    alerts.push('Anúncios rodando mas sem landing page otimizada. Sua conversão está no chão.');
  if (d('trafego') && !d('copy'))
    alerts.push('Tráfego sem copywriting estruturado. O visitante chega, não entende o valor — e vai embora.');
  if (d('organico') && !d('posicionamento'))
    alerts.push('Conteúdo sem posicionamento definido. Você cria, mas não atrai o cliente certo.');
  if (d('upsell') && !d('crm'))
    alerts.push('Upsell sem CRM é desperdiçar potencial. Estruture a base antes de escalar o ticket.');
  if (d('remarketing') && !d('ux'))
    alerts.push('Remarketing ativo com UX ruim: você traz de volta quem vai abandonar o carrinho de novo.');
  if (d('recompra') && !d('relacionamento'))
    alerts.push('Estratégia de recompra sem relacionamento construído. O cliente não tem motivo para voltar.');

  sec.style.display = 'block';
  list.innerHTML = '';

  if (alerts.length === 0) {
    const card = document.createElement('div');
    card.className = 'diag-card is-ok';
    card.innerHTML = `<span class="diag-dot"></span> Nenhum conflito crítico detectado. Continue avançando pela jornada.`;
    list.appendChild(card);
    return;
  }

  alerts.forEach(msg => {
    const card = document.createElement('div');
    card.className = 'diag-card is-alert';
    card.innerHTML = `<span class="diag-dot"></span> ${msg}`;
    list.appendChild(card);
  });
}

// ─────────────────────────────────────────────────
//  PANEL HELPERS
// ─────────────────────────────────────────────────
function buildLinksHTML(links, color) {
  if (!links || links.length === 0) return '';

  const toolLinks = links.filter(l => l.type === 'tool');
  const caseLinks = links.filter(l => l.type !== 'tool');
  let html = '';

  // ── Cases block (amber) ──────────────────────────
  if (caseLinks.length > 0) {
    const hasGroups = caseLinks.some(l => l.group);
    let rows = '';

    if (hasGroups) {
      const groups = {};
      const order  = [];
      caseLinks.forEach(l => {
        const g = l.group || '';
        if (!groups[g]) { groups[g] = []; order.push(g); }
        groups[g].push(l);
      });
      order.forEach((g, gi) => {
        if (g) {
          if (gi > 0) rows += `<div style="height:1px;background:rgba(255,168,38,0.1);margin:6px 0 6px;"></div>`;
          rows += `<p class="links-group-title">${g}</p>`;
        }
        groups[g].forEach(l => {
          rows += `<div class="link-row">
            <span class="link-name">${l.label}</span>
            <a class="link-anchor" href="${l.url}" target="_blank" rel="noopener">↗ abrir</a>
          </div>`;
        });
      });
    } else {
      caseLinks.forEach(l => {
        rows += `<div class="link-row">
          <span class="link-name">${l.label}</span>
          <a class="link-anchor" href="${l.url}" target="_blank" rel="noopener">↗ abrir</a>
        </div>`;
      });
    }

    html += `<div class="links-block">
      <p class="block-label">✦ cases &amp; referências</p>
      ${rows}
    </div>`;
  }

  // ── Tools block (blue) ───────────────────────────
  if (toolLinks.length > 0) {
    let rows = '';
    toolLinks.forEach(l => {
      rows += `<div class="link-row">
        <span class="link-name">${l.label}</span>
        <a class="link-anchor" href="${l.url}" target="_blank" rel="noopener">↗ abrir</a>
      </div>`;
    });

    html += `<div class="tools-block">
      <p class="block-label">⚙ ferramenta parceira</p>
      ${rows}
    </div>`;
  }

  return html;
}

// ─────────────────────────────────────────────────
//  PANEL
// ─────────────────────────────────────────────────
function openPanel(nodeId) {
  const node = getNode(nodeId);
  if (!node) return;

  state.active = nodeId;

  const color = node.stageColor;
  document.getElementById('panel').style.setProperty('--panel-color', color);
  document.getElementById('panel-stage').textContent  = `${node.stageNum} — ${node.stageName}`;
  document.getElementById('panel-stage').style.color  = color;
  document.getElementById('panel-title').textContent  = `${node.icon} ${node.name}`;

  document.getElementById('panel-body').innerHTML = `
    <div class="info-block" style="border-left-color:${color}">
      <p class="block-label">O que é</p>
      <p class="block-text">${node.what}</p>
    </div>
    <div class="info-block" style="border-left-color:${color}">
      <p class="block-label">Por que importa</p>
      <p class="block-text">${node.why}</p>
    </div>
    ${buildLinksHTML(node.links, color)}
  `;

  syncToggleBtn();

  document.getElementById('overlay').classList.add('is-visible');
  document.getElementById('panel').classList.add('is-open');

  // Update active state in flow
  document.querySelectorAll('.node').forEach(el => el.classList.remove('is-active'));
  const nodeEl = document.getElementById(`n-${nodeId}`);
  if (nodeEl) nodeEl.classList.add('is-active');
}

function closePanel() {
  state.active = null;
  document.getElementById('overlay').classList.remove('is-visible');
  document.getElementById('panel').classList.remove('is-open');
  document.querySelectorAll('.node').forEach(el => el.classList.remove('is-active'));
}

function syncToggleBtn() {
  const id    = state.active;
  if (!id) return;
  const done  = state.done.has(id);
  const btn   = document.getElementById('toggle-btn');
  document.getElementById('toggle-icon').textContent  = '';
  document.getElementById('toggle-label').textContent = done ? 'Marcado como estruturado' : 'Marcar como estruturado';
  done ? btn.classList.add('is-done') : btn.classList.remove('is-done');
}

function toggleDone() {
  const id = state.active;
  if (!id) return;
  state.done.has(id) ? state.done.delete(id) : state.done.add(id);
  syncToggleBtn();
  renderFlow();
  renderProgress();
  renderDiagnosis();
  // Re-apply active class
  const el = document.getElementById(`n-${id}`);
  if (el) el.classList.add('is-active');
}

// ─────────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────────
document.getElementById('overlay').addEventListener('click', closePanel);
document.getElementById('close-btn').addEventListener('click', closePanel);
document.getElementById('toggle-btn').addEventListener('click', toggleDone);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ─────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────
renderFlow();
renderProgress();

</script>
</body>
</html>
